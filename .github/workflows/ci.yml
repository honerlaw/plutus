name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.13
      - name: Install deps
        run: uv sync --frozen
      - name: Pre-commit
        run: uv run pre-commit run --all-files
      - name: Tests
        run: uv run pytest
