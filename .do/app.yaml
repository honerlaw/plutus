name: plutus
region: nyc

services:
  - name: web
    github:
      repo: derekhonerlaw/plutus
      branch: main
      deploy_on_push: true
    build_command: pip install uv && uv sync
    run_command: doppler run -- uvicorn plutus.web:app --host 0.0.0.0 --port 8080
    environment_slug: python
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080
    health_check:
      http_path: /health
    envs:
      - key: DOPPLER_TOKEN
        scope: RUN_TIME
        type: SECRET

workers:
  - name: trader
    github:
      repo: derekhonerlaw/plutus
      branch: main
      deploy_on_push: true
    build_command: pip install uv && uv sync
    run_command: doppler run -- uv run plutus run
    environment_slug: python
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: DOPPLER_TOKEN
        scope: RUN_TIME
        type: SECRET
